<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MusicEntry</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <div id="mobile-topbar">
        <div id="mobile-logo">
            <div id="logo-icon-m"><i class="fas fa-music"></i></div>
            <span>Music<strong>Entry</strong></span>
        </div>
    </div>

    <nav id="sidebar">

        <div id="logo">
            <div id="logo-icon"><i class="fas fa-music"></i></div>
            <span>Music<strong>Entry</strong></span>
        </div>

        <div class="nav-divider"></div>

        <div class="nav-section" id="form-section">
            <p class="nav-label">Add Entry</p>

            <label>Song Title</label>
            <input type="text" id="song_title" placeholder="e.g. Blinding Lights">

            <label>Artist</label>
            <input type="text" id="artist" placeholder="e.g. The Weeknd">

            <label>Album</label>
            <input type="text" id="album" placeholder="e.g. After Hours">

            <label>Genre</label>
            <select id="genre">
                <option value="" disabled selected>Select genre</option>
                <option>Pop</option>
                <option>Rock</option>
                <option>R&B</option>
                <option>Hip-Hop</option>
                <option>Jazz</option>
                <option>Classical</option>
                <option>Electronic</option>
                <option>Indie Pop</option>
                <option>Synth-pop</option>
                <option>Dance-pop</option>
                <option>Soul</option>
                <option>Funk</option>
                <option>Electropop</option>
                <option>Other</option>
            </select>

            <label>Year Release</label>
            <input type="number" id="year_release" placeholder="e.g. 2024" min="1900" max="2099">

            <input type="hidden" id="ID">

            <div id="btn-row">
                <button id="add"><i class="fas fa-plus"></i> ADD SONG</button>
                <button id="update"><i class="fas fa-pen"></i> UPDATE</button>
            </div>
        </div>

    </nav>

    <main id="main">

        <header id="main-header">
            <div id="header-title">
                <h1>Songs</h1>
            </div>
            <div id="header-controls">
                <button id="play-all"><i class="fas fa-play"></i></button>
                <button id="shuffle-btn"><i class="fas fa-shuffle"></i></button>
            </div>
        </header>

        <div id="list-header">
            <span class="col-title">TITLE</span>
            <span class="col-album">ALBUM</span>
            <span class="col-genre">GENRE</span>
            <span class="col-year">YEAR</span>
            <span class="col-actions">ACTIONS</span>
        </div>

        <div id="table-wrapper">
            <div id="tableBody"></div>
        </div>

    </main>

    <script src="script.js"></script>
</body>
</html>
